<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>notalbin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ── 基础样式 ── */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  :root {
    --font: "PingFang SC", "苹方", "Microsoft YaHei", sans-serif;
    --bg: #f5f4f7;
    --surface: #ffffff;
    --border: rgba(140, 120, 160, 0.13);
    --border-soft: rgba(140, 120, 160, 0.08);
    --text: #2d2636;
    --text-sub: #8a82a0;
    --text-muted: #b0a8c4;
    --accent: #7c6fa0;
    --accent-hover: #6a5d8e;
    --accent-dim: rgba(124, 111, 160, 0.10);
    --accent-glow: rgba(124, 111, 160, 0.18);
    --divider: rgba(140, 120, 160, 0.20);
    --input-bg: #faf9fc;
    --tag-bg: rgba(124, 111, 160, 0.08);
    --tag-active: rgba(124, 111, 160, 0.16);
    --shadow: 0 1px 8px rgba(100, 80, 140, 0.06), 0 0 0 1px var(--border);
    --link-bg: rgba(124, 111, 160, 0.07);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1820;
      --surface: #211f28;
      --border: rgba(160, 140, 200, 0.10);
      --border-soft: rgba(160, 140, 200, 0.06);
      --text: #e2ddf0;
      --text-sub: #8f88a8;
      --text-muted: #5e5878;
      --accent: #a08cc8;
      --accent-hover: #b39fd8;
      --accent-dim: rgba(160, 140, 200, 0.12);
      --accent-glow: rgba(160, 140, 200, 0.20);
      --divider: rgba(160, 140, 200, 0.12);
      --input-bg: #1d1b25;
      --tag-bg: rgba(160, 140, 200, 0.08);
      --tag-active: rgba(160, 140, 200, 0.18);
      --shadow: 0 1px 8px rgba(0, 0, 0, 0.25), 0 0 0 1px var(--border);
      --link-bg: rgba(160, 140, 200, 0.08);
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px;
  }

  header { width: 100%; max-width: 640px; margin-bottom: 32px; }
  .site-title { font-size: 22px; font-weight: 500; color: var(--text); margin-bottom: 12px; }
  .site-title span { color: var(--accent); }
  .divider { width: 100%; height: 1px; background: linear-gradient(90deg, var(--divider) 0%, transparent 100%); }

  #app { width: 100%; max-width: 640px; }
  .card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 12px; padding: 24px; box-shadow: var(--shadow); }

  textarea {
    width: 100%; min-height: 240px; font-family: var(--font); font-size: 15px;
    background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px; resize: vertical; outline: none; color: var(--text);
  }

  .options-row { display: flex; align-items: center; gap: 8px; margin-top: 16px; }
  .tag { 
    background: var(--tag-bg); border: none; border-radius: 20px; 
    padding: 4px 12px; cursor: pointer; color: var(--text-sub); 
  }
  .tag.active { background: var(--accent-dim); color: var(--accent); font-weight: bold; }

  .submit-row { margin-top: 20px; display: flex; justify-content: flex-end; }
  .btn-submit { 
    background: var(--accent); color: white; border: none; 
    padding: 10px 28px; border-radius: 8px; cursor: pointer; font-weight: 500;
  }

  .result-block { margin-top: 20px; background: var(--link-bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; display: none; flex-direction: column; gap: 10px; }
  .result-block.visible { display: flex; }
  .result-link { color: var(--accent); word-break: break-all; }
  .status-msg { text-align: center; padding: 40px; color: var(--text-sub); }
</style>
</head>
<body>

<header>
  <div class="site-title">notal<span>bin</span></div>
  <div class="divider"></div>
</header>

<div id="app"></div>

<script>
window.addEventListener('DOMContentLoaded', () => {
    // 配置信息
    const SUPABASE_URL = 'https://zkpctzxyqpiiqxvnmauo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprcGN0enh5cXBpaXF4dm5tYXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNDkxNDAsImV4cCI6MjA5MDkyNTE0MH0.Z7WdneCs_vJOblWho1neuMLI86h1FrdNqi6N2-DI4ZQ';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const app = document.getElementById('app');

    const EXPIRES = [
        { label: '1 小时', value: 1 },
        { label: '3 小时', value: 3 },
        { label: '1 天',   value: 24 },
        { label: '1 周',   value: 24 * 7 },
        { label: '1 个月', value: 24 * 30 }
    ];

    const params = new URLSearchParams(location.search);
    const viewId = params.get('id');

    if (viewId) {
        renderView(viewId);
    } else {
        renderCreate();
    }

    async function renderView(id) {
        app.innerHTML = `<div class="status-msg">加载中...</div>`;
        const { data, error } = await db.from('pastes').select('*').eq('id', id).maybeSingle();

        if (error || !data) {
            app.innerHTML = `<div class="status-msg">内容不存在或已过期。<br><br><a href="${location.pathname}" style="color:var(--accent)">返回首页</a></div>`;
            return;
        }

        app.innerHTML = `
            <div class="card">
                <div style="font-size:12px; color:var(--text-muted); margin-bottom:15px;">
                    有效至: ${new Date(data.expires_at).toLocaleString()}
                </div>
                <div style="white-space:pre-wrap; word-break:break-all; line-height:1.6;">${data.content}</div>
            </div>
        `;
    }

    function renderCreate() {
        let selectedIdx = 2;
        app.innerHTML = `
            <div class="card">
                <textarea id="content" placeholder="在这里粘贴内容..."></textarea>
                <div class="options-row">
                    <span style="font-size:13px; color:var(--text-sub)">有效期</span>
                    <div id="tags" style="display:flex; gap:6px;"></div>
                </div>
                <div class="submit-row">
                    <button class="btn-submit" id="submitBtn">生成链接</button>
                </div>
                <div id="resultBlock" class="result-block">
                    <div style="font-size:12px; color:var(--text-muted)">粘贴板链接：</div>
                    <a id="resultLink" class="result-link" target="_blank"></a>
                </div>
            </div>
        `;

        const tagsEl = document.getElementById('tags');
        EXPIRES.forEach((e, i) => {
            const btn = document.createElement('button');
            btn.className = 'tag' + (i === selectedIdx ? ' active' : '');
            btn.textContent = e.label;
            btn.onclick = () => {
                selectedIdx = i;
                Array.from(tagsEl.children).forEach((t, j) => t.classList.toggle('active', j === i));
            };
            tagsEl.appendChild(btn);
        });

        document.getElementById('submitBtn').onclick = async () => {
            const content = document.getElementById('content').value.trim();
            if (!content) return alert('请输入内容');

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '处理中...';

            const expires_at = new Date(Date.now() + EXPIRES[selectedIdx].value * 3600 * 1000).toISOString();
            
            const { data, error } = await db.from('pastes').insert({ content, expires_at }).select('id').single();

            btn.disabled = false;
            btn.textContent = '生成链接';

            if (error) return alert('失败: ' + error.message);

            const link = window.location.origin + window.location.pathname + '?id=' + data.id;
            const linkEl = document.getElementById('resultLink');
            linkEl.href = link;
            linkEl.textContent = link;
            document.getElementById('resultBlock').style.display = 'flex';
        };
    }
});
</script>
</body>
</html>
